// MoH Arena Demo Reviewer launch config.
// Committed game file -- edit directly; copied verbatim into the review homepath.
// Primary control path is com_pipefile; these binds are fallbacks.
seta cheats "1"
seta sv_cheats "1"
seta logfile "2"
seta logfile_timestamps "1"
seta cl_freezeDemo "0"
seta timescale "1"
seta cg_3rd_person "0"
seta fps "0"
// Hide the in-game weapon-select bar; it is useless for review and overlaps the HUD.
seta ui_weaponsbar "0"
// In-game review HUD overlay text (driven live over the pipe; shown with ui_addhud).
seta moh_arena_hud_line1 "MoH Arena Review | 00:00.0 | PLAY 1x"
seta moh_arena_hud_line2 "3P OFF | X-RAY OFF | REC idle"
seta moh_arena_hud_line3 ""

bind F5 "set timescale 0.0001; set cl_freezeDemo 1"
bind F6 "set timescale 1; set cl_freezeDemo 0"
bind F7 "toggle cg_3rd_person"
bind F8 "demo review"
bind F9 "+scores"
bind F10 "togglemenu moh_arena_demo_review"
bind F11 "-scores"
bind F12 "screenshot"
bind KP_HOME "set timescale 0.1; set cl_freezeDemo 0"
bind KP_UPARROW "set timescale 0.25; set cl_freezeDemo 0"
bind KP_PGUP "set timescale 0.5; set cl_freezeDemo 0"
bind KP_LEFTARROW "set timescale 2; set cl_freezeDemo 0"
bind KP_5 "set timescale 4; set cl_freezeDemo 0"
bind KP_RIGHTARROW "set timescale 8; set cl_freezeDemo 0"
bind KP_END "set timescale 16; set cl_freezeDemo 0"
bind KP_DOWNARROW "set timescale 64; set cl_freezeDemo 0"
